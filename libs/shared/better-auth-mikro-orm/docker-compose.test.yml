version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: better-auth-mikro-orm-test
    environment:
      POSTGRES_DB: better_auth_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d better_auth_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

volumes:
  postgres_test_data:
